# Template: AI PR review via AWS Bedrock (advanced)
#
# Used by `/configure` Step 5g.1 when
# `integrations.github.rules.prs.ai_review.provider == "bedrock"`.
# `/configure` substitutes:
#   {{PROJECT_NAME}}      → project.name from configure.json
#   {{AI_REVIEW_MODEL}}   → integrations.github.rules.prs.ai_review.model
#                           (default: anthropic.claude-sonnet-4-6 —
#                            BARE id, no date suffix, no -v1:0)
#   {{AI_REVIEW_REGION}}  → integrations.github.rules.prs.ai_review.region
#                           (default: us-west-2)
#
# Prerequisites the user must complete before the first run — all of
# these can fail silently, so verify each:
#   1. AWS account with Bedrock available in at least one US region.
#   2. AWS IAM OIDC provider for token.actions.githubusercontent.com
#      (one-time per account).
#   3. IAM role trusted by GitHub for this repo, with permission to
#      call bedrock:InvokeModel + bedrock:InvokeModelWithResponseStream
#      on the foundation-model ARNs in all 3 US regions (us-east-1,
#      us-east-2, us-west-2) AND on the cross-region inference profile
#      ARN. Newer Anthropic Bedrock models are INFERENCE_PROFILE-only —
#      you cannot invoke the bare foundation-model ARN directly.
#   4. Bedrock Marketplace EULA accepted for the chosen Anthropic model
#      (some accounts also need a use-case form approved before
#      invocation works). This can return success on agreement creation
#      and STILL fail invocation with `ValidationException: Operation
#      not allowed` — that's a "contact AWS support" wall.
#   5. Repo secret `AI_REVIEW_AWS_ROLE_ARN` set to the role ARN.
#
# Discover the right model id for your account:
#     aws bedrock list-foundation-models --region us-west-2 \
#         --query "modelSummaries[?contains(modelId, 'claude-sonnet')].modelId" \
#         --output text
#
# Newer Anthropic models on Bedrock use bare ids like
# `anthropic.claude-sonnet-4-6` — NOT the older
# `us.anthropic.claude-sonnet-4-6-20251001-v1:0` cross-region form.
# `/configure` defaults to the bare id; override with question #55 if
# your account exposes a different shape.
#
# Caveat — workflow-validation gate:
#   `anthropics/claude-code-action@v1` requires the workflow file on
#   the PR head to byte-equal the version on the default branch. The
#   configure PR adds this file for the first time, so its review is
#   skipped. Real reviews begin on the next PR after configure merges.
#
# Caveat — Dependabot PRs:
#   Dependabot PRs run with restricted secrets, so
#   `secrets.AI_REVIEW_AWS_ROLE_ARN` is empty on those runs and the
#   OIDC step fails. Either grant Dependabot access to the secret in
#   repo settings, or accept that Dependabot PRs are not AI-reviewed.

name: ai-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AI_REVIEW_AWS_ROLE_ARN }}
          aws-region: {{AI_REVIEW_REGION}}

      - name: Run Claude PR review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          use_sticky_comment: "true"
          claude_args: |
            --model {{AI_REVIEW_MODEL}}
          prompt: |
            You are reviewing this pull request for {{PROJECT_NAME}}.

            Produce ONE comment with these sections:

            1. **Summary** — 2–3 sentences on what this change does.
            2. **Findings** — concrete issues only. Cite file:line.
               Group by:
                 - Correctness / bugs
                 - Security
                 - Performance
                 - Maintainability / readability
               Skip stylistic nitpicks already enforced by linters.
            3. **Suggestions** — actionable changes the author can make.
               Quote the diff snippet you'd change.
            4. **Verdict** — one of: approve · request-changes ·
               comment-only.

            Project conventions live in `docs/conventions/` and
            `CLAUDE.md` — honor them when those files are present.
