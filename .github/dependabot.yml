version: 2
updates:
  # Root workspace orchestration (Husky, lint-staged, commitlint, Prettier)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope

  # Backend module (NestJS).
  # Pre-created so the first /new-release that scaffolds src/backend/package.json
  # immediately picks up dependency updates without needing a Dependabot edit.
  - package-ecosystem: npm
    directory: /src/backend
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: chore
      include: scope

  # Frontend module (React + Tailwind + Vite).
  - package-ecosystem: npm
    directory: /src/frontend
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions versions.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope
