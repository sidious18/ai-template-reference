version: 2
updates:
  # Backend module — npm
  - package-ecosystem: "npm"
    directory: "/src/backend"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      backend-prod:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      backend-dev:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # Frontend module — npm
  - package-ecosystem: "npm"
    directory: "/src/frontend"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      frontend-prod:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      frontend-dev:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
